<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | Faith & Fitness</title>
    <link rel="stylesheet" href="../assets/global.css">
    <style>
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .month-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-name {
            text-align: center;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding-bottom: 10px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            transition: transform 0.2s;
        }

        .calendar-day.empty {
            background: transparent;
            border: none;
        }

        /* Status Colors based on user requirements */
        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }

        .status-missing {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .bg-green { background: var(--success); }
        .bg-yellow { background: var(--warning); }
        .bg-red { background: var(--error); }

    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header animate-fade-in">
            <h1 class="page-title">Voting Tracker</h1>
        </div>

        <div class="glass-panel animate-fade-in" style="padding: 20px; animation-delay: 0.1s;">
            <div class="calendar-header">
                <h2 class="month-title" id="monthYear">Loading...</h2>
            </div>

            <div class="calendar-grid" id="calendarGrid">
                <!-- Days will be generated here by JS -->
            </div>
            
            <div class="legend">
                <div class="legend-item"><div class="legend-color bg-green"></div> Completed</div>
                <div class="legend-item"><div class="legend-color bg-yellow"></div> Pending Today</div>
                <div class="legend-item"><div class="legend-color bg-red"></div> Missing</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="voting.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            <span class="nav-label">Voting</span>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            <span class="nav-label">Rank</span>
        </a>
        <a href="calendar.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span class="nav-label">Calendar</span>
        </a>
        <a href="messages.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span class="nav-label">Messages</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script type="module" src="calendar.js"></script>
</body>
</html>
