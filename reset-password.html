<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Faith & Fitness</title>
    <link rel="stylesheet" href="../assets/global.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-panel animate-fade-in">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your phone number to reset</p>
            </div>
            
            <form id="resetForm">
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your registered phone" required>
                </div>
                
                <div class="input-group" id="newPassGroup" style="display:none;">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                </div>
                
                <button type="submit" class="btn-primary" id="resetBtn">
                    Verify Account
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Remembered? <a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="reset-password.js"></script>
</body>
</html>
