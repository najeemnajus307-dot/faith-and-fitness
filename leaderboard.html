<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | Faith & Fitness</title>
    <link rel="stylesheet" href="../assets/global.css">
    <style>
        .leaderboard-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rank-card {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: var(--radius-md);
            transition: transform 0.2s ease;
        }

        .rank-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.05);
        }

        .rank-number {
            font-size: 1.25rem;
            font-weight: 800;
            width: 40px;
            color: var(--text-muted);
        }

        /* Top 3 Ranks colors */
        .rank-1 .rank-number { color: #fbbf24; font-size: 1.5rem; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .rank-2 .rank-number { color: #94a3b8; font-size: 1.4rem; }
        .rank-3 .rank-number { color: #b45309; font-size: 1.3rem; }
        
        .rank-1 { border: 1px solid rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.05); }

        .rank-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-right: 15px;
        }

        .rank-info {
            flex-grow: 1;
        }

        .rank-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }

        .rank-points {
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
        }
        
        /* Your rank highlighting */
        .my-rank {
            border: 1px solid var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header animate-fade-in">
            <h1 class="page-title">Leaderboard</h1>
        </div>

        <div id="leaderboardList" class="leaderboard-container animate-fade-in" style="animation-delay: 0.1s;">
            <!-- Skeletons -->
            <div class="rank-card glass-panel" style="height: 70px; opacity: 0.7;"></div>
            <div class="rank-card glass-panel" style="height: 70px; opacity: 0.5;"></div>
            <div class="rank-card glass-panel" style="height: 70px; opacity: 0.3;"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="voting.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            <span class="nav-label">Voting</span>
        </a>
        <a href="leaderboard.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            <span class="nav-label">Rank</span>
        </a>
        <a href="calendar.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span class="nav-label">Calendar</span>
        </a>
        <a href="messages.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span class="nav-label">Messages</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="nav-label">Profile</span>

    </nav>

    <script type="module" src="leaderboard.js"></script>
</body>
</html>
