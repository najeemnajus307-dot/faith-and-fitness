<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Faith & Fitness</title>
    <link rel="stylesheet" href="../assets/global.css">
    <style>
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            padding: 20px;
            overflow: hidden;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .post-meta h3 {
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .post-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .post-content {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .post-media {
            width: 100%;
            border-radius: var(--radius-md);
            margin-top: 15px;
            max-height: 300px;
            object-fit: cover;
        }
        
        .post-video {
            width: 100%;
            border-radius: var(--radius-md);
            margin-top: 15px;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header animate-fade-in">
            <h1 class="page-title">Announcements</h1>
        </div>

        <div id="feedContainer" class="feed-container animate-fade-in" style="animation-delay: 0.1s;">
            <!-- Loading -->
            <div class="post-card glass-panel" style="height: 150px; opacity: 0.6;"></div>
            <div class="post-card glass-panel" style="height: 150px; opacity: 0.3;"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="voting.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            <span class="nav-label">Voting</span>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            <span class="nav-label">Rank</span>
        </a>
        <a href="calendar.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span class="nav-label">Calendar</span>
        </a>
        <a href="messages.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span class="nav-label">Messages</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script type="module" src="messages.js"></script>
</body>
</html>
